<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 64" role="img" aria-label="Priya Saira Mistry — Technology Advisor">
  <defs>
    <style>
      .v1-name {
        font-family: 'Cormorant Garamond', 'Garamond', Georgia, serif;
        font-size: 24px;
        font-weight: 300;
        letter-spacing: 0.05em;
      }
      .v1-tag {
        font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
        font-size: 7.5px;
        font-weight: 400;
        letter-spacing: 0.24em;
      }
    </style>
  </defs>

  <!-- ── Mark: nested diamond geometry ── -->
  <g transform="translate(2, 4)">
    <!-- Outer diamond — amber stroke -->
    <polygon
      points="28,0 56,28 28,56 0,28"
      fill="none"
      stroke="#c09050"
      stroke-width="1.4"
    />
    <!-- Inner diamond — amber fill -->
    <polygon
      points="28,16 40,28 28,40 16,28"
      fill="#c09050"
      opacity="0.9"
    />
    <!-- Tiny centre square — dark, creates depth -->
    <polygon
      points="28,23 33,28 28,33 23,28"
      fill="#0b0c0f"
    />
  </g>

  <!-- ── Vertical rule ── -->
  <line x1="72" y1="10" x2="72" y2="54" stroke="#c09050" stroke-width="0.75" opacity="0.35"/>

  <!-- ── Wordmark ── -->
  <text x="86" y="34" class="v1-name" fill="currentColor">Priya Saira Mistry</text>
  <text x="87" y="50" class="v1-tag" fill="#c09050">Technology Advisor</text>

</svg>
