<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 86" role="img" aria-label="Priya Saira Mistry — Technology Advisor">
  <defs>
    <style>
      .v2-initial {
        font-family: 'Cormorant Garamond', 'Garamond', Georgia, serif;
        font-size: 66px;
        font-weight: 300;
        font-style: italic;
      }
      .v2-name {
        font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
        font-size: 7.5px;
        font-weight: 400;
        letter-spacing: 0.3em;
      }
      .v2-tag {
        font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
        font-size: 6.5px;
        font-weight: 300;
        letter-spacing: 0.22em;
      }
    </style>
  </defs>

  <!-- ── Diamond mark (same geometry as Logo V1) centered vertically ── -->
  <g transform="translate(2, 15)">
    <polygon points="28,0 56,28 28,56 0,28" fill="none" stroke="#c09050" stroke-width="1.4"/>
    <polygon points="28,16 40,28 28,40 16,28" fill="#c09050" opacity="0.9"/>
    <polygon points="28,23 33,28 28,33 23,28" fill="#0b0c0f"/>
  </g>

  <!-- ── Vertical rule separating mark from initials ── -->
  <line x1="72" y1="12" x2="72" y2="64" stroke="#c09050" stroke-width="0.75" opacity="0.3"/>

  <!-- ── Three initials, each at equal 52px step for equidistant spacing ── -->
  <text x="82"  y="62" class="v2-initial" fill="#c09050">P</text>
  <text x="134" y="62" class="v2-initial" fill="currentColor" opacity="0.88">S</text>
  <text x="186" y="62" class="v2-initial" fill="currentColor" opacity="0.88">M</text>

  <!-- ── Horizontal rule ── -->
  <line x1="0" y1="70" x2="420" y2="70" stroke="#c09050" stroke-width="0.7" opacity="0.35"/>

  <!-- ── Full name left, tagline right ── -->
  <text x="2"   y="80" class="v2-name" fill="currentColor" opacity="0.72">PRIYA SAIRA MISTRY</text>
  <text x="420" y="80" class="v2-tag"  fill="#c09050" opacity="0.8" text-anchor="end">TECHNOLOGY ADVISOR</text>

</svg>
